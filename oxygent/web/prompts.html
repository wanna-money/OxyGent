<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Manager - OxyGent</title>
    <link rel="shortcut icon" href="./image/group-favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/prompt-manager.css">
    <link rel="stylesheet" href="./css/guide.css">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <script src="./js/prompt-manager.js" defer></script>
</head>
<body>
    <!-- Header (matches node.html) -->
    <div class="node-header">
        <div class="node-header-left">
            <img class="node-header-logo" src="./image/group-favicon.png" alt="">
            <span class="node-header-title">Prompt Manager</span>
        </div>
        <div class="node-header-center">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Search prompts..." onkeyup="handleSearch(event)">
            </div>
        </div>
        <div class="node-header-right">
            <button class="node-header-btn" onclick="loadPrompts()" title="Refresh all prompts">
                <img src="./image/refresh.svg" alt=""/>
                <span>Refresh</span>
            </button>
            <button class="node-header-btn" onclick="startGuideTour()" title="Feature Guide">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="7"/><path d="M6 6a2 2 0 1 1 2.5 1.9c-.5.3-.5.6-.5 1.1"/><circle cx="8" cy="12" r="0.5" fill="currentColor" stroke="none"/></svg>
                <span>Guide</span>
            </button>
            <button class="node-header-btn" onclick="window.open('index.html', '_self')">
                <img src="./image/arrow-left.svg" alt=""/>
                Back
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-wrapper">
        <div id="promptsList" class="prompts-grid">
            <!-- Dynamic Content will be loaded here -->
        </div>
    </div>

    <!-- Edit Prompt Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Prompt</h2>
                <button class="close" onclick="hideEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-form">
                    <div class="form-group">
                        <label for="edit_prompt_key">Prompt Key</label>
                        <input type="text" id="edit_prompt_key" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label for="edit_prompt_content">Prompt Content</label>
                        <textarea id="edit_prompt_content" class="form-control" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="hideEditModal()">Cancel</button>
                <button type="button" id="save-prompt-btn" class="btn btn-primary" onclick="savePrompt()" disabled>Save Changes <span class="btn-badge"></span></button>
            </div>
        </div>
    </div>

    <!-- Version Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Version Preview</h2>
                <button class="close" onclick="hidePreviewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="preview-info">
                    <div class="preview-meta">
                        <span class="preview-version" id="preview-version-info"></span>
                        <span class="preview-date" id="preview-date-info"></span>
                    </div>
                    <div class="preview-stats" id="preview-stats"></div>
                </div>
                <div class="preview-content-container">
                    <div class="preview-content-header">
                        <h3>Content</h3>
                        <div class="preview-actions">
                            <button class="btn btn-sm btn-secondary" onclick="copyPreviewContent()">Copy</button>
                            <button class="btn btn-sm btn-primary" onclick="togglePreviewMode()">View Mode</button>
                        </div>
                    </div>
                    <div class="preview-content" id="preview-content">
                        <!-- Content loaded here -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="hidePreviewModal()">Close</button>
                <button type="button" class="btn btn-warning" id="preview-rollback-btn">
                    Rollback to this version <span class="btn-badge"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Version History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Version History</h2>
                <button class="close" onclick="hideHistoryModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="version-list" class="version-history">
                    <!-- History loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="hideHistoryModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Rollback Confirmation Modal -->
    <div id="rollback-modal" class="modal">
        <div class="modal-content" style="max-width: 500px; height: auto; margin-top: 15vh;">
            <div class="modal-header">
                <h2>Confirm Rollback</h2>
                <button class="close" onclick="hideRollbackModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="rollback-message" style="margin-bottom: 20px; line-height: 1.6;"></p>
                <p style="color: #666; font-size: 14px;">This will create a new version with the content from the selected version.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="hideRollbackModal()">Cancel</button>
                <button type="button" class="btn btn-warning" id="confirm-rollback-btn">Confirm <span class="btn-badge"></span></button>
            </div>
        </div>
    </div>

    <!-- Prompt Optimization Modal -->
    <div id="optimize-modal" class="modal">
        <div class="modal-content" style="max-width: 900px; max-height: 90vh; margin-top: 5vh; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h2>✨ Optimize Prompt</h2>
                <button class="close" onclick="hideOptimizeModal()">&times;</button>
            </div>
            <div class="modal-body" style="overflow-y: auto; flex: 1;">
                <!-- Prompt Info -->
                <div class="form-group">
                    <label>Prompt Key</label>
                    <input type="text" id="optimize_prompt_key" class="form-control" readonly>
                </div>

                <!-- Agent Type -->
                <div class="form-group">
                    <label for="optimize_agent_type">Agent Type</label>
                    <select id="optimize_agent_type" class="form-control">
                        <option value="general">General</option>
                        <option value="react">ReAct Agent</option>
                    </select>
                    <small style="color: #666; display: block; margin-top: 5px;">
                        <span id="agent_type_source">-</span>
                    </small>
                </div>

                <!-- Optimization Strategy -->
                <div class="form-group">
                    <label for="optimize_strategy">Optimization Strategy</label>
                    <select id="optimize_strategy" class="form-control">
                        <option value="comprehensive">Comprehensive (Recommended)</option>
                        <option value="clarity">Improve Clarity</option>
                        <option value="structure">Improve Structure</option>
                        <option value="completeness">Improve Completeness</option>
                        <option value="effectiveness">Improve Effectiveness</option>
                    </select>
                </div>

                <!-- Custom Requirements -->
                <div class="form-group">
                    <label for="optimize_requirements">Custom Requirements (Optional)</label>
                    <textarea id="optimize_requirements" class="form-control" rows="3"
                        placeholder="E.g., Make it more concise, add examples for edge cases, focus on error handling..."></textarea>
                </div>

                <!-- Optimization Results (Hidden by default) -->
                <div id="optimize-results" style="display: none; margin-top: 20px;">
                    <div style="border-top: 2px solid #e0e0e0; padding-top: 20px;">
                        <h3 style="margin-bottom: 15px;">📊 Analysis & Optimization Results</h3>

                        <!-- Top Row: Analysis and Improvements -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                            <!-- Analysis -->
                            <div class="form-group" style="margin-bottom: 0;">
                                <label>🔍 Analysis</label>
                                <div id="optimize-analysis" style="background: #f5f5f5; padding: 15px; border-radius: 5px; line-height: 1.6;"></div>
                            </div>

                            <!-- Improvements -->
                            <div class="form-group" style="margin-bottom: 0;">
                                <label>✨ Improvements</label>
                                <ul id="optimize-improvements" style="background: #e8f5e9; padding: 15px 15px 15px 40px; border-radius: 5px; margin: 0;"></ul>
                            </div>
                        </div>

                        <!-- Bottom Row: Rationale and Validation -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                            <!-- Rationale -->
                            <div class="form-group" style="margin-bottom: 0;">
                                <label>💡 Rationale</label>
                                <div id="optimize-rationale" style="background: #fff3e0; padding: 15px; border-radius: 5px; line-height: 1.6;"></div>
                            </div>

                            <!-- Validation -->
                            <div class="form-group" style="margin-bottom: 0;">
                                <label>✅ Validation</label>
                                <div id="optimize-validation" style="padding: 10px; border-radius: 5px;"></div>
                            </div>
                        </div>

                        <!-- Comparison View -->
                        <div style="margin-top: 20px;">
                            <h4 style="margin-bottom: 10px;">📝 Comparison</h4>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                <!-- Original -->
                                <div>
                                    <label>Original Prompt</label>
                                    <textarea id="optimize-original" class="form-control" rows="10" readonly
                                        style="background: #f9f9f9; font-size: 12px;"></textarea>
                                </div>
                                <!-- Optimized -->
                                <div>
                                    <label>Optimized Prompt</label>
                                    <textarea id="optimize-optimized" class="form-control" rows="10"
                                        style="background: #e8f5e9; font-size: 12px;"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="hideOptimizeModal()">Cancel</button>
                <button type="button" class="btn btn-info" id="preview-optimize-btn" onclick="previewOptimization()">
                    👁️ Preview Optimization <span class="btn-badge"></span>
                </button>
                <button type="button" class="btn btn-success" id="apply-optimize-btn" onclick="applyOptimization()" style="display: none;">
                    ✅ Apply Optimization <span class="btn-badge"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Guide Tour Overlay -->
    <div class="tour-mask" id="tour-mask">
        <div class="tour-spotlight" id="tour-spotlight"></div>
        <div class="tour-tooltip" id="tour-tooltip">
            <div class="tour-tooltip-icon" id="tour-icon"></div>
            <div class="tour-tooltip-title" id="tour-title"></div>
            <div class="tour-tooltip-desc" id="tour-desc"></div>
            <div class="tour-tooltip-step">
                <span class="tour-tooltip-counter" id="tour-counter"></span>
                <div class="tour-tooltip-nav">
                    <button class="tour-tooltip-btn" id="tour-skip-btn" onclick="endGuideTour()">Skip</button>
                    <button class="tour-tooltip-btn primary" id="tour-next-btn" onclick="nextGuideTourStep()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ========== Feature Guide Tour ==========
    var _guideTourRunning = false;
    var _guideTourStepIndex = 0;
    var _guideTourAutoTimer = null;

    var _guideTourSteps = [
        {
            selector: '.search-box',
            icon: '\u{1F50D}',
            title: 'Search Prompts',
            desc: 'Filter prompts by prompt_key, content, agent_type, or description. Matches in real-time as you type (debounced 300ms).',
            tooltipPos: 'below'
        },
        {
            selector: '.node-header-right',
            icon: '\u{1F504}',
            title: 'Toolbar',
            desc: 'Refresh re-fetches all prompts from /api/prompts/. Guide opens this walkthrough. Back returns to the main OxyGent page.',
            tooltipPos: 'below'
        },
        {
            selector: '.prompt-card',
            icon: '\u{1F4C4}',
            title: 'Prompt Card',
            desc: 'Displays prompt_key, agent_type badge, version number, and a content preview (300 chars). Click the content area to open the edit modal where you can modify and save changes.',
            tooltipPos: 'below'
        },
        {
            selector: '.badge-version-btn',
            icon: '\u{1F4D6}',
            title: 'Version History',
            desc: 'Click the version badge to view all saved versions. You can preview any version\'s full content, copy it, or rollback — rollback creates a new version with the old content.',
            tooltipPos: 'below'
        },
        {
            selector: '.optimize-btn',
            icon: '\u{2728}',
            title: 'Optimize Prompt',
            desc: 'Opens AI-powered optimization. Choose a strategy (comprehensive, clarity, structure, completeness, effectiveness), add custom requirements, then preview the optimized result and apply it.',
            tooltipPos: 'above'
        }
    ];

    function startGuideTour() {
        if (_guideTourRunning) return;
        _guideTourRunning = true;
        _guideTourStepIndex = 0;
        document.getElementById('tour-mask').classList.add('visible');
        _showGuideTourStep(0);
    }

    function _showGuideTourStep(index) {
        if (index < 0 || index >= _guideTourSteps.length) {
            endGuideTour();
            return;
        }

        _guideTourStepIndex = index;
        var step = _guideTourSteps[index];

        var targetEl = document.querySelector(step.selector);
        if (!targetEl) {
            if (index < _guideTourSteps.length - 1) {
                _showGuideTourStep(index + 1);
            } else {
                endGuideTour();
            }
            return;
        }

        var elRect = targetEl.getBoundingClientRect();
        var pad = 4;
        var spotLeft = elRect.left - pad;
        var spotTop = elRect.top - pad;
        var spotW = elRect.width + pad * 2;
        var spotH = elRect.height + pad * 2;

        var spotlight = document.getElementById('tour-spotlight');
        spotlight.style.left = spotLeft + 'px';
        spotlight.style.top = spotTop + 'px';
        spotlight.style.width = spotW + 'px';
        spotlight.style.height = spotH + 'px';

        var tooltip = document.getElementById('tour-tooltip');
        var firstShow = !tooltip.classList.contains('visible');

        var winW = window.innerWidth;
        var winH = window.innerHeight;
        var ttWidth = 320;
        var ttHeight = 180;
        var gap = 16;
        var resolvedPos = step.tooltipPos;

        if (resolvedPos === 'right' && spotLeft + spotW + gap + ttWidth > winW) {
            resolvedPos = 'left';
        } else if (resolvedPos === 'left' && spotLeft - gap - ttWidth < 0) {
            resolvedPos = 'right';
        } else if (resolvedPos === 'below' && spotTop + spotH + gap + ttHeight > winH) {
            resolvedPos = 'above';
        } else if (resolvedPos === 'above' && spotTop - gap - ttHeight < 0) {
            resolvedPos = 'below';
        }

        var ttLeft, ttTop;

        if (resolvedPos === 'below') {
            ttLeft = Math.max(gap, Math.min(spotLeft, winW - ttWidth - gap));
            ttTop = spotTop + spotH + gap;
        } else if (resolvedPos === 'above') {
            ttLeft = Math.max(gap, Math.min(spotLeft, winW - ttWidth - gap));
            ttTop = spotTop - ttHeight - gap;
        } else if (resolvedPos === 'right') {
            ttLeft = spotLeft + spotW + gap;
            ttTop = Math.max(gap, Math.min(spotTop, winH - ttHeight - gap));
        } else {
            ttLeft = spotLeft - ttWidth - gap;
            ttTop = Math.max(gap, Math.min(spotTop, winH - ttHeight - gap));
        }

        ttLeft = Math.max(gap, Math.min(ttLeft, winW - ttWidth - gap));
        ttTop = Math.max(gap, Math.min(ttTop, winH - ttHeight - gap));

        function writeContent() {
            document.getElementById('tour-icon').textContent = step.icon;
            document.getElementById('tour-title').textContent = step.title;
            document.getElementById('tour-desc').textContent = step.desc;
            document.getElementById('tour-counter').textContent = (index + 1) + ' / ' + _guideTourSteps.length;
            var nextBtn = document.getElementById('tour-next-btn');
            nextBtn.textContent = (index === _guideTourSteps.length - 1) ? 'Finish' : 'Next';
        }

        if (firstShow) {
            tooltip.style.transition = 'none';
            tooltip.style.left = ttLeft + 'px';
            tooltip.style.top = ttTop + 'px';
            void tooltip.offsetWidth;
            tooltip.style.transition = '';
            writeContent();
            requestAnimationFrame(function() {
                tooltip.classList.add('visible');
            });
        } else {
            tooltip.style.left = ttLeft + 'px';
            tooltip.style.top = ttTop + 'px';
            tooltip.classList.add('content-swapping');
            setTimeout(function() {
                writeContent();
                tooltip.classList.remove('content-swapping');
            }, 180);
        }

        clearTimeout(_guideTourAutoTimer);
        _guideTourAutoTimer = setTimeout(function() {
            if (_guideTourRunning) nextGuideTourStep();
        }, 6000);
    }

    function nextGuideTourStep() {
        clearTimeout(_guideTourAutoTimer);
        if (_guideTourStepIndex >= _guideTourSteps.length - 1) {
            endGuideTour();
        } else {
            _showGuideTourStep(_guideTourStepIndex + 1);
        }
    }

    function endGuideTour() {
        clearTimeout(_guideTourAutoTimer);
        _guideTourRunning = false;
        var tooltip = document.getElementById('tour-tooltip');
        tooltip.classList.remove('visible');
        setTimeout(function() {
            document.getElementById('tour-mask').classList.remove('visible');
        }, 300);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && _guideTourRunning) {
            endGuideTour();
        }
    });
    </script>

</body>
</html>
