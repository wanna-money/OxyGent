            forkFrameIndex: forkFrameIndex,
            traceId: "",

        };
        branches.push(b);
        activeBranchId = b.id;
        show_id = 0;
        return b;

    function switchBranch(branchId) {
        if (llm_is_work) return;
        var b = branches.find(function(x) { return x.id === branchId; });

        show_id = Math.max(0, b.frames.length - 1);

        renderTimeline();
        show_step();
        if (b.frames.length > 0) {
            show_by_history(b.frames[show_id]);
        }

            pill.className = 'branch-pill' + (b.id === activeBranchId ? ' active' : '')

            pill.title = b.traceId ? ('trace: ' + b.traceId) : b.label;

    function sha256(ascii) {
        function rightRotate(v, amount) {
            return (v >>> amount) | (v << (32 - amount));
        }

        var mathPow = Math.pow, max = Math.max, imul = Math.imul;
        var result = '', i, j;
        var asciiBitLength = ascii.length * 8;
        var hash = [], k = [];
        var primeCounter = 0;

        function isPrime(n) {
            if (n < 2) return false;
            for (var i = 2; i * i <= n; i++) if (n % i === 0) return false;
            return true;
        }

        for (var candidate = 2; primeCounter < 64; candidate++) {
            if (isPrime(candidate)) {
                hash[primeCounter] = (mathPow(candidate, .5) * 4294967296) | 0;
                k[primeCounter++] = (mathPow(candidate, 1 / 3) * 4294967296) | 0;
            }
        }
        ascii += '\x80'
        while (ascii.length % 64 - 56) ascii += '\x00'
        for (i = 0; i < ascii.length; i++) asciiBitLength += ascii.charCodeAt(i) << ((i % 4) * 8);
        var w = [];
        for (i = 0; i < ascii.length;) {
            var j = 0;
            for (; j < 16; j++) w[j] = (ascii.charCodeAt(i++) << 24) | (ascii.charCodeAt(i++) << 16) | (ascii.charCodeAt(i++) << 8) | (ascii.charCodeAt(i++));
            for (; j < 64; j++) w[j] = (rightRotate(w[j - 2], 17) ^ rightRotate(w[j - 2], 19) ^ (w[j - 2] >>> 10) + w[j - 7] + rightRotate(w[j - 15], 7) ^ rightRotate(w[j - 15], 18) ^ (w[j - 15] >>> 3) + w[j - 16]) | 0;
            var a = hash[0], b = hash[1], c = hash[2], d = hash[3], e = hash[4], f = hash[5], g = hash[6], h = hash[7];
            for (j = 0; j < 64; j++) {
                var t1 = h + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & f) ^ ((~e) & g)) + k[j] + w[j];
                var t2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & b) ^ (a & c) ^ (b & c));
                h = g;
                g = f;
                f = e;
                e = (d + t1) | 0;
                d = c;
                c = b;
                b = a;
                a = (t1 + t2) | 0;
            }
            hash[0] = (hash[0] + a) | 0;
            hash[1] = (hash[1] + b) | 0;
            hash[2] = (hash[2] + c) | 0;
            hash[3] = (hash[3] + d) | 0;
            hash[4] = (hash[4] + e) | 0;
            hash[5] = (hash[5] + f) | 0;
            hash[6] = (hash[6] + g) | 0;
            hash[7] = (hash[7] + h) | 0;
        }
        for (i = 0; i < hash.length; i++) for (j = 3; j + 1; j--) {
            var b = (hash[i] >> (j * 8)) & 255;
            result += ((b >> 4).toString(16)) + ((b & 15).toString(16));
        }
        return result;
    }

        return hash.slice(0, length);
    }

    function add_tool_call(arr) {

    // 删除某个数组（根据数组内容删除）
    function remove_tool_call(arr) {
        // 找到和arr内容完全一样的数组的索引
        const index = tool_calls.findIndex(item =>
            item.length === arr.length && item.every((v, i) => v === arr[i])
        );
        if (index !== -1) {
            tool_calls.splice(index, 1);
            return true; // 删除成功
        }
        return false; // 没找到
    }

    // 查看当前所有数组

    function getNodeColors(tool_calls) {
        const nodeColors = {};
        const childrenSet = new Set();

        for (const path of tool_calls) {
            let parent = [];
            for (let i = 0; i < path.length; i++) {
                const node = path[i];
                const current = parent.concat([node]);
                const nodeKey = encodeList(current);

                if (!(nodeKey in nodeColors)) {
                    nodeColors[nodeKey] = 'red'; // 默认叶子
                }
                if (parent.length > 0) {
                    childrenSet.add(encodeList(parent));
                }
                parent = current;
            }
        }

        for (const key of childrenSet) {
            nodeColors[key] = 'yellow';
        }
        return nodeColors;
    }

    function diffNodeColors(node_state, new_node_state) {
        const result = {};
        // 所有涉及到的节点
        const allNodes = new Set([
            ...Object.keys(node_state),
            ...Object.keys(new_node_state)
        ]);

        allNodes.forEach(node => {
            const oldColor = node_state[node];
            const newColor = new_node_state[node];

            if (newColor === undefined) {
                // 新状态没有这个节点，且之前是红或黄，需要变成白色
                if (oldColor === 'red' || oldColor === 'yellow') {
                    result[node] = 'white';
                }
            } else if (oldColor !== newColor) {
                // 颜色发生变化
                result[node] = newColor;
            }
            // 颜色相同，不输出
        });

        return result;
    }

    function push_plan(caller, type, content, node_id = '', callee, callee_category = '') {
        if (!plan_dict.hasOwnProperty(caller)) {
            plan_dict[caller] = {
                "agent_name": caller,
                "job_desc": "",
                "intention": "",
                "plannings": [],
                "answer": ""
            };
        }
        if (type === "observation" || type === "plan") {
            plan_dict[caller]["plannings"].push({
                "callee": callee,
                "type": type,
                "content": content,
                "node_id": node_id,
                "callee_category": callee_category
            });
        } else {
            plan_dict[caller][type] = content;
        }
        // console.log(plan_dict);
    }

    function message_handler(message) {
        // console.log(message)
        if (message.startsWith("服务器")) {
            console.log(message);
            return;
        }
        let jm = JSON.parse(message);
        
        // 处理流式输出消息
        if (jm["type"] === "stream") {
            handle_stream_message(jm);
            return;
        }
        
        if (!["tool_call", "observation"].includes(jm["type"])) {
            return;
        }

        console.log(getActiveFrames().length + 1, JSON.parse(JSON.stringify(jm)));

        var frames = getActiveFrames();
        var history = {};
        if (frames.length > 0) {
            history = JSON.parse(JSON.stringify(frames[frames.length - 1]));
        }

        if (jm["type"] == "tool_call") {
            var _cc = jm["content"];
            // Feed LLM/tool nodes into the Trace Graph tree.
            if (_cc && (_cc["callee_category"] === 'llm' || _cc["callee_category"] === 'tool')) {
                traceGraphAddNode({
                    node_id: _cc["node_id"],
                    copied_node_id: _cc["copied_node_id"] || '',
                    node_type: _cc["callee_category"],
                    caller: _cc["caller"] || '',
                    callee: _cc["callee"] || '',
                    trace_id: _cc["current_trace_id"] || _cc["trace_id"] || ''
                });
            }
            // Set traceId on the active branch.
            if (_cc && (_cc["current_trace_id"] || _cc["trace_id"])) {
                traceGraphSetTrace(_cc["current_trace_id"] || _cc["trace_id"]);
            }

            if (jm["content"]["callee_category"] === 'agent') {
                push_plan(jm["content"]["callee"], "job_desc", jm["content"].arguments.query, jm["content"].node_id);
                history["agent_log"] = JSON.parse(JSON.stringify(plan_dict[jm["content"]["callee"]]));
            }

            if (jm["content"]["callee_category"] === 'agent' || jm["content"]["callee_category"] === 'tool' || jm["content"]["callee_category"] === 'bank') {
                add_tool_call(jm["content"]["call_stack"].slice(1));
                history["tool_call"] = getNodeColors(get_all_tool_calls());
            }

            if (jm["content"]["caller_category"] === 'agent' && jm["content"]["callee_category"] === 'agent') {
                var msg = {
                    "role": jm["content"].caller,
                    "content": jm["content"].arguments.query,
                    "at": jm["content"].callee
                };
                chats.push(msg);
                history["answer"] = JSON.parse(JSON.stringify(chats));
            } else if (jm["content"]["caller_category"] === 'agent' && jm["content"]["callee_category"] === 'llm') {
                // 开始调用llm，准备流式输出
                current_streaming_agent = jm["content"]["caller"];
                var node_id = jm["content"]["node_id"];
                // 创建流式输出的消息元素
                create_streaming_message_element(current_streaming_agent, node_id);
                return;
            }
        }

        if (jm["type"] == "observation") {
            // Track copied_node_id from ALL observations (including cached/replayed nodes
            // that don't get a tool_call message and thus aren't in traceGraphData).
            var _oc = jm["content"];
            if (_oc && _oc["node_id"] && _oc["copied_node_id"]) {
                nodeCopiedIdMap[_oc["node_id"]] = _oc["copied_node_id"];
            }

            if (jm["content"]["caller"] === 'user') {
                // answer
                from_trace_id = jm["content"]["current_trace_id"];
                var activeBranch = getActiveBranch();
                if (activeBranch) {
                    activeBranch.traceId = from_trace_id;
                    renderTraceGraph();
                }
                var trace_id = jm["content"]["current_trace_id"] || jm["content"]["trace_id"];
                var markdownInput = jm["content"]["output"];
                if (typeof markdownInput !== 'string') {
                    markdownInput = JSON.stringify(markdownInput, null, 2);
                }
                // 如果存在流式输出元素，使用流式输出的内容（可能更完整）
                // 查找对应的流式输出元素（优先使用node_id，否则使用agent名称）
                var node_id = jm["content"]["node_id"];
                var agent_name = jm["content"]["callee"];
                var key = node_id || agent_name;
                var streaming_info = streaming_elements_map[key];
                
                if (streaming_info && streaming_info.element) {
                    var finalContent = streaming_info.element.text();
                    if (finalContent) {
                        markdownInput = finalContent;
                    }
                    // 移除streaming-content类并清理
                    streaming_info.element.removeClass("streaming-content");
                    attach_rating_ui(streaming_info.element.closest("li"), trace_id);
                    attach_trace_chain(streaming_info.element.closest("li"), trace_id);
                    delete streaming_elements_map[key];
                } else if (current_streaming_element && current_streaming_agent) {
                    // 向后兼容
                    var finalContent = current_streaming_element.text();
                    if (finalContent) {
                        markdownInput = finalContent;
                    }
                    attach_rating_ui(current_streaming_element.closest("li"), trace_id);
                    attach_trace_chain(current_streaming_element.closest("li"), trace_id);
                }
                
                var msg = {"role": jm["content"].callee, "content": markdownInput, "trace_id": trace_id};
                chats.push(msg);
                history["answer"] = JSON.parse(JSON.stringify(chats));
                llm_is_work = false;
                renderTraceGraph();
                // $("#message_send").text("Send");
                // 重置react_memory
                plan_dict = {};
                // 流式输出完成，移除streaming-content类（向后兼容）
                if (current_streaming_element) {
                    current_streaming_element.removeClass("streaming-content");
                    current_streaming_element = null;
                }
                current_streaming_agent = null;
                // 清理所有流式输出元素
                streaming_elements_map = {};
            } else if (jm["content"]["caller_category"] === 'agent' && jm["content"]["callee_category"] === 'agent') {
                push_plan(jm["content"]["caller"], "observation", jm["content"].output, jm["content"].node_id, jm["content"]["callee"], jm["content"]["callee_category"]);
                history["agent_log"] = JSON.parse(JSON.stringify(plan_dict[jm["content"]["caller"]]));

                var msg = {
                    "role": jm["content"].callee,
                    "content": jm["content"].output,
                    "at": jm["content"].caller
                };
                chats.push(msg);
                history["answer"] = JSON.parse(JSON.stringify(chats));
            } else if (jm["content"]["caller_category"] === 'agent' && jm["content"]["callee_category"] === 'llm') {
                push_plan(jm["content"]["caller"], "plan", jm["content"].output, jm["content"].node_id, jm["content"]["callee"], jm["content"]["callee_category"]);
                history["agent_log"] = JSON.parse(JSON.stringify(plan_dict[jm["content"]["caller"]]));
                // 流式输出完成，移除streaming-content类
                // 注意：planning内容不保存到chats，只保存到plan_dict
                var node_id = jm["content"]["node_id"];
                var key = node_id || jm["content"]["caller"];
                var streaming_info = streaming_elements_map[key];
                if (streaming_info && streaming_info.element) {
                    streaming_info.element.removeClass("streaming-content");
                    delete streaming_elements_map[key];
                }
                // 向后兼容
                if (current_streaming_element) {
                    current_streaming_element.removeClass("streaming-content");
                    current_streaming_element = null;
                }
                current_streaming_agent = null;
            } else if (jm["content"]["caller_category"] === 'agent' && ['tool', 'bank', 'memory_bank'].includes(jm["content"]["callee_category"])) {
                push_plan(jm["content"]["caller"], "observation", jm["content"].output, jm["content"].node_id, jm["content"]["callee"], jm["content"]["callee_category"]);
                history["agent_log"] = JSON.parse(JSON.stringify(plan_dict[jm["content"]["caller"]]));
            }

            if (jm["content"]["callee_category"] === 'agent' || ['tool', 'bank', 'memory_bank'].includes(jm["content"]["callee_category"])) {
                remove_tool_call(jm["content"]["call_stack"].slice(1));
                history["tool_call"] = getNodeColors(get_all_tool_calls());
            }
        }

        show_by_history(history);
        frames.push(history);
        show_id = frames.length - 1;
        show_step();
        appendTimelineFrame(history, frames.length - 1);
    }

    // ── Zoom & Minimap ──
    var orgZoomLevel = 1.0;
    var orgContainer = document.querySelector('.center-scroll');
    var orgWrapper = document.getElementById('org-zoom-wrapper');
    var orgMinimapCanvas = document.getElementById('org-minimap-canvas');
    var orgMinimapViewport = document.getElementById('org-minimap-viewport');
    var orgZoomLevelSpan = document.getElementById('org-zoom-level');

    function updateOrgZoom() {
        orgWrapper.style.transform = 'scale(' + orgZoomLevel + ')';
        orgZoomLevelSpan.textContent = Math.round(orgZoomLevel * 100) + '%';
        // After scale changes, scroll dimensions change — update minimap after a short delay
        setTimeout(updateMinimap, 150);
    }

    function orgZoomIn() {
        orgZoomLevel = Math.min(1.5, Math.round((orgZoomLevel + 0.1) * 10) / 10);
        updateOrgZoom();
    }
    function orgZoomOut() {
        orgZoomLevel = Math.max(0.3, Math.round((orgZoomLevel - 0.1) * 10) / 10);
        updateOrgZoom();
    }
    function orgZoomReset() {
        orgZoomLevel = 1.0;
        updateOrgZoom();
    }

    document.getElementById('org-zoom-in').addEventListener('click', orgZoomIn);
    document.getElementById('org-zoom-out').addEventListener('click', orgZoomOut);
    document.getElementById('org-zoom-reset').addEventListener('click', orgZoomReset);

    // Ctrl/Cmd + wheel to zoom
    orgContainer.addEventListener('wheel', function (e) {
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            if (e.deltaY < 0) orgZoomIn(); else orgZoomOut();
        }
    }, { passive: false });

    // ── Minimap rendering ──
    function updateMinimap() {
        var canvas = orgMinimapCanvas;
        var ctx = canvas.getContext('2d');
        var cw = canvas.width, ch = canvas.height;
        ctx.clearRect(0, 0, cw, ch);

        // Content size = wrapper's scrollable extent (unscaled)
        var contentW = orgWrapper.scrollWidth;
        var contentH = orgWrapper.scrollHeight;
        if (contentW === 0 || contentH === 0) return;

        // Scale factor to fit content into minimap
        var scaleX = cw / contentW;
        var scaleY = ch / contentH;
        var scale = Math.min(scaleX, scaleY);

        // Offset to center the drawing in minimap
        var offX = (cw - contentW * scale) / 2;
        var offY = (ch - contentH * scale) / 2;

        // Draw each node as a small rectangle
        var nodes = orgWrapper.querySelectorAll('.item-template');
        nodes.forEach(function (node) {
            // Get position relative to wrapper (since wrapper is the offset parent via inline-block)
            var r = node.getBoundingClientRect();
            var wr = orgWrapper.getBoundingClientRect();
            var nx = (r.left - wr.left) / orgZoomLevel;
            var ny = (r.top - wr.top) / orgZoomLevel;
            var nw = r.width / orgZoomLevel;
            var nh = r.height / orgZoomLevel;

            var x = offX + nx * scale;
            var y = offY + ny * scale;
            var w = nw * scale;
            var h = nh * scale;

            if (node.classList.contains('select')) {
                ctx.fillStyle = '#155EEE';
                ctx.strokeStyle = '#155EEE';
                ctx.lineWidth = 0.5;
            } else if (node.classList.contains('pre-select')) {
                ctx.fillStyle = '#C5D3E8';
                ctx.strokeStyle = '#155EEE';
                ctx.lineWidth = 1.5;
            } else {
                ctx.fillStyle = '#C5D3E8';
                ctx.strokeStyle = '#93A8C9';
                ctx.lineWidth = 0.5;
            }
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);
        });

        // Update viewport rectangle
        // Visible area in content coordinates (unscaled)
        var visW = orgContainer.clientWidth / orgZoomLevel;
        var visH = orgContainer.clientHeight / orgZoomLevel;
        var scrollL = orgContainer.scrollLeft / orgZoomLevel;
        var scrollT = orgContainer.scrollTop / orgZoomLevel;

        var vpLeft = offX + scrollL * scale;
        var vpTop = offY + scrollT * scale;
        var vpW = visW * scale;
        var vpH = visH * scale;

        orgMinimapViewport.style.left = vpLeft + 'px';
        orgMinimapViewport.style.top = vpTop + 'px';
        orgMinimapViewport.style.width = vpW + 'px';
        orgMinimapViewport.style.height = vpH + 'px';
    }

    // Sync minimap on scroll
    orgContainer.addEventListener('scroll', updateMinimap);

    // Drag viewport on minimap to scroll
    (function () {
        var dragging = false;
        var startX, startY, startScrollL, startScrollT;

        var minimap = document.getElementById('org-minimap');

        function getMinimapScale() {
            var contentW = orgWrapper.scrollWidth;
            var contentH = orgWrapper.scrollHeight;
            var cw = orgMinimapCanvas.width, ch = orgMinimapCanvas.height;
            var scaleX = cw / contentW;
            var scaleY = ch / contentH;
            return Math.min(scaleX, scaleY);
        }

        minimap.addEventListener('mousedown', function (e) {
            e.preventDefault();
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startScrollL = orgContainer.scrollLeft;
            startScrollT = orgContainer.scrollTop;
        });

        document.addEventListener('mousemove', function (e) {
            if (!dragging) return;
            var scale = getMinimapScale();
            if (scale === 0) return;
            var dx = (e.clientX - startX) / scale * orgZoomLevel;
            var dy = (e.clientY - startY) / scale * orgZoomLevel;
            orgContainer.scrollLeft = startScrollL + dx;
            orgContainer.scrollTop = startScrollT + dy;
        });

        document.addEventListener('mouseup', function () {
            dragging = false;
        });

        // Click on minimap to jump
        minimap.addEventListener('click', function (e) {
            if (e.target === orgMinimapViewport) return;
            var rect = minimap.getBoundingClientRect();
            var mx = e.clientX - rect.left;
            var my = e.clientY - rect.top;

            var contentW = orgWrapper.scrollWidth;
            var contentH = orgWrapper.scrollHeight;
            var cw = orgMinimapCanvas.width, ch = orgMinimapCanvas.height;
            var scale = getMinimapScale();
            var offX = (cw - contentW * scale) / 2;
            var offY = (ch - contentH * scale) / 2;

            var contentX = (mx - offX) / scale;
            var contentY = (my - offY) / scale;

            orgContainer.scrollLeft = contentX * orgZoomLevel - orgContainer.clientWidth / 2;
            orgContainer.scrollTop = contentY * orgZoomLevel - orgContainer.clientHeight / 2;
        });
    })();

    // 处理流式消息
    function handle_stream_message(jm) {
        var agent_name = jm["content"]["agent"];
        var node_id = jm["content"]["node_id"];
        var delta = jm["content"]["delta"] || "";
        
        if (!delta) {
            return;
        }
        
        // 如果没有agent名称，使用默认值（向后兼容）
        if (!agent_name) {
            agent_name = current_streaming_agent || master_agent_name;
        }
        
        // 获取或创建流式输出元素
        var key = node_id || agent_name;
        var streaming_info = streaming_elements_map[key];
        
        if (!streaming_info) {
            // 创建新的流式输出元素
            create_streaming_message_element(agent_name, node_id);
            streaming_info = streaming_elements_map[key];
        }
        
        // 追加流式内容
        if (streaming_info && streaming_info.element) {
            var currentText = streaming_info.element.text();
            streaming_info.element.text(currentText + delta);
            scroll_top_div_chat_history();
        }
    }

    function submit_rating(container, rating_type, comment) {
        var trace_id = container.data("trace-id");
        if (!trace_id) {
            return;
        }
        
        fetch(rating_config.endpoint, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                trace_id: trace_id,
                rating_type: rating_type,
                comment: comment || "",
                erp: rating_config.erp
            })
        })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error("Request failed");
                }
                return response.json();
            })
            .then(function () {
                // Reset active states
                container.find(".btn-icon").removeClass("active");
                
                // Set new active state (triggers CSS animation)
                if (rating_type === "like") {
                    container.find(".btn-icon.like").addClass("active");
                } else if (rating_type === "dislike") {
                    container.find(".btn-icon.dislike").addClass("active");
                }
            })
            .catch(function (err) {
                console.error("Rating submission error:", err);
            });

        // Row 1: Options + Submit Button (Dynamic Slot 1)
        var row1 = $('<div class="feedback-row-1">');
        var feedbackOptions = $('<div class="feedback-options">');
        row1.append(feedbackOptions);

        // Row 2: Input + Submit Button (Dynamic Slot 2)
        var row2 = $('<div class="feedback-row-2">');
        var inputWrapper = $('<div class="feedback-input-wrapper">');
        var customInput = $('<input type="text" class="feedback-input" placeholder="(Optional) Tell us more about your experience">');
        inputWrapper.append(customInput);
        row2.append(inputWrapper);

        // Submit Button (Single instance moved around)
        var submitBtn = $('<button class="feedback-submit-btn">Submit</button>');

        var reasons = [
            "Offensive/Unsafe",
            "Factually incorrect",
            "Not helpful",
            "Privacy concern",
            "Other"
        ];

        // Build Options
        reasons.forEach(function(reason) {

            btn.on("click", function() {
                $(this).toggleClass('selected');
                updatePanelState();
            });
            feedbackOptions.append(btn);
        });

        function updatePanelState() {
            var selectedTags = feedbackOptions.find('.feedback-option.selected');
            var isOtherSelected = false;
            var hasSelection = selectedTags.length > 0;

            selectedTags.each(function() {
                if ($(this).text() === "Other") {
                    isOtherSelected = true;
                }
            });

            if (!hasSelection) {
                submitBtn.hide();
                row2.hide(); 
                if (submitBtn.parent().length) submitBtn.detach(); 
            } else {
                submitBtn.show(); 
                submitBtn.css('display', 'block'); 

                if (isOtherSelected) {
                    // Mode 2: Show Row 2, Move button to Row 2
                    row2.css('display', 'flex'); 
                    row2.append(submitBtn);
                    customInput.focus();
                } else {
                    // Mode 1: Hide Row 2, Move button to Row 1
                    row2.hide();
                    customInput.val(''); 
                    row1.append(submitBtn);
                }
            }
        }

        // Close logic
        feedbackHeader.find('.feedback-close').on('click', function() {
            feedbackPanel.fadeOut(200);
        });

        // Submit Logic
        submitBtn.on('click', function() {
            var selectedReasons = [];
            feedbackOptions.find('.feedback-option.selected').each(function() {
                selectedReasons.push($(this).text());
            });
            
            var comment = customInput.val().trim();
            
            var finalReason = selectedReasons.join(", ");
            if (comment) {
                if (finalReason) {
                    finalReason += " | Details: " + comment;
                } else {
                    finalReason = comment;
                }
            }
            
            submit_rating(container, "dislike", finalReason || "Unspecified feedback");
            feedbackPanel.fadeOut(200);
        });

        feedbackPanel.append(feedbackHeader, row1, row2);

        // Button Actions
        likeBtn.on("click", function () {
            // Close feedback panel if open
            feedbackPanel.hide();
            // Submit Like
            submit_rating(container, "like", "");
        });

        dislikeBtn.on("click", function () {
            // Toggle Feedback Panel
            if (feedbackPanel.is(':visible')) {
                feedbackPanel.fadeOut(200);
            } else {
                feedbackPanel.fadeIn(200);
                // Reset state
                feedbackOptions.find('.feedback-option').removeClass('selected');
                submitBtn.hide();
                row2.hide();
                customInput.val('');
            }
        });

        actions.append(likeBtn, dislikeBtn);
        container.append(actions, feedbackPanel);
        return container;
    }

    function attach_rating_ui(li, trace_id) {
        if (!trace_id || !li || li.length === 0) {

    // ── Trace Graph (LLM/tool node tree across all branches) ──
    // Each branch stores its own ordered list of LLM/tool nodes.
    // The tree is built from the branch hierarchy (parentBranchId) and
    // fork-point detection (matching shared node_id prefixes between
    // parent and child, with forkFrameIndex as fallback).
    // Renders incrementally — every traceGraphAddNode triggers a re-render.

    var traceGraphData = {};  // branch_id → [{ node_id, copied_node_id, node_type, caller, callee, trace_id, frameIndex }]
    var nodeCopiedIdMap = {};  // node_id → copied_node_id (populated from ALL observation messages, including cached nodes)

    function traceGraphReset() {
        traceGraphData = {};
        nodeCopiedIdMap = {};
    }

    function traceGraphAddNode(node) {
        var ab = getActiveBranch();
        if (!ab || !node || !node.node_id) return;
        if (!traceGraphData[ab.id]) traceGraphData[ab.id] = [];
        traceGraphData[ab.id].push({
            node_id: node.node_id,
            copied_node_id: node.copied_node_id || '',
            node_type: node.node_type,
            caller: node.caller || '',
            callee: node.callee || '',
            trace_id: node.trace_id || '',
            frameIndex: getActiveFrames().length
        });
        // Auto-expand on very first node across all branches
        var total = 0;
        for (var k in traceGraphData) total += traceGraphData[k].length;
        if (total === 1) {
            $('#tracegraph-section').removeClass('collapsed');
            document.body.classList.remove('tracegraph-hidden');
        }
        renderTraceGraph();
    }

    var START_NODE = '<div class="tg-node tg-node-start" title="Start">'
        + '<div class="tg-node-main">'
        + '<svg class="tg-node-icon-svg" width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/><polygon points="7.5,5.5 13,9 7.5,12.5" fill="#fff"/></svg>'
        + '<span class="tg-node-callee">Start</span>'
        + '</div></div>';

    var END_NODE = '<div class="tg-node tg-node-end" title="End">'
        + '<div class="tg-node-main">'
        + '<svg class="tg-node-icon-svg" width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/><rect x="6.5" y="6.5" width="5" height="5" rx="0.5" fill="#fff"/></svg>'
        + '<span class="tg-node-callee">End</span>'
        + '</div></div>';

    var RUNNING_NODE = '<div class="tg-node tg-node-running" title="Running">'
        + '<div class="tg-node-main">'
        + '<svg class="tg-node-icon-svg tg-spin" width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="6.5" fill="none" stroke="#e5e7eb" stroke-width="2"/><path d="M9 2.5 a6.5 6.5 0 0 1 6.5 6.5" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/></svg>'
        + '<span class="tg-node-callee">Running</span>'
        + '</div></div>';

    // Return End for completed branches, Running for the active branch while
    // the LLM is still working. Non-active branches are always finished.
    function terminalNodeFor(branch) {
        var ab = getActiveBranch();
        var isActive = ab && branch && ab.id === branch.id;
        return (llm_is_work && isActive) ? RUNNING_NODE : END_NODE;
    }

    function renderTraceGraph() {
        var $body = $('#tracegraph-body');
        var hasData = false;
        for (var k in traceGraphData) {
            if (traceGraphData[k] && traceGraphData[k].length) { hasData = true; break; }
        }
        if (!hasData) {
            $body.html('<div class="tg-empty">No LLM/tool nodes yet.</div>');
            return;
        }
        var roots = branches.filter(function(b) { return !b.parentBranchId; });
        if (!roots.length) return;
        // Promote child branches whose fork point is before parent's first node
        // (forkNodeIdx === -1, i.e. rerun on the very first node) to virtual roots,
        // so both the original and rerun flow as siblings directly off Start.
        var virtualRoots = roots.slice();
        branches.forEach(function(b) {
            if (b.parentBranchId && b.forkNodeIdx === -1) {
                if (virtualRoots.indexOf(b) === -1) virtualRoots.push(b);
            }
        });
        // A branch is a "real" virtual root for End-rendering if it has no
        // descendant branches that fork from a real node (forkNodeIdx >= 0).
        var html = '<div class="tg-tree">';
        // Single chain with no forks at all: Start → chain → End (inline)
        var anyForks = branches.some(function(b) {
            return b.parentBranchId && b.forkNodeIdx != null && b.forkNodeIdx >= 0;
        });
        if (virtualRoots.length === 1 && !anyForks) {
            html += '<div class="tg-branch">' + START_NODE + ARROW;
            var nodes = traceGraphData[virtualRoots[0].id] || [];
            for (var i = 0; i < nodes.length; i++) {
                if (i > 0) html += ARROW;
                html += renderNodeEl(nodes[i], virtualRoots[0]);
            }
            html += ARROW + terminalNodeFor(virtualRoots[0]) + '</div>';
        } else {
            // Multiple virtual roots OR forks within a chain: Start → fork → branches → End
            html += '<div class="tg-branch">' + START_NODE;
            html += '<span class="tg-fork-line"></span>';
            html += '<div class="tg-children">';
            virtualRoots.forEach(function(rb) { html += renderBranchSubtreeWithEnd(rb, 0); });
            html += '</div></div>';
        }
        html += '</div>';
        $body.html(html);
    }

    // Render nodes of `branch` from index `startIdx` onward, inserting
    // child-branch forks at the correct positions.
    function renderBranchSubtree(branch, startIdx, showArrowPrefix) {
        var nodes = traceGraphData[branch.id] || [];
        // Exclude children promoted to virtual roots (forkNodeIdx === -1)
        var childBranches = branches.filter(function(b) {
            return b.parentBranchId === branch.id && b.forkNodeIdx !== -1;
        });

        // Determine fork point for each child branch.
        // Prefer the pre-computed forkNodeIdx stored on the branch object.
        // Fall back to frameIndex matching if forkNodeIdx is not set.
        var forkAt = {};  // nodeIdx → [ { branch, skipCount } , … ]
        childBranches.forEach(function(cb) {
            var forkIdx;
            if (cb.forkNodeIdx != null && cb.forkNodeIdx >= 0) {
                // Pre-computed at branch-creation time
                forkIdx = cb.forkNodeIdx;
            } else if (cb.forkNodeIdx === -1) {
                // Fork is before the first parent node → attach at node 0
                // (the child will appear alongside the parent's first node)
                forkIdx = 0;
            } else {
                // Legacy / fallback: use forkFrameIndex to find the position
                forkIdx = -1;
                if (cb.forkFrameIndex != null) {
                    for (var j = nodes.length - 1; j >= 0; j--) {
                        if (nodes[j].frameIndex <= cb.forkFrameIndex) {
                            forkIdx = j; break;
                        }
                    }
                }
                if (forkIdx === -1) forkIdx = Math.max(0, nodes.length - 1);
            }
            console.log('[TraceGraph] render fork:', cb.id,
                'forkNodeIdx:', cb.forkNodeIdx,
                'resolved forkIdx:', forkIdx,
                'parentNodes:', nodes.length,
                'childNodes:', (traceGraphData[cb.id] || []).length);
            if (!forkAt[forkIdx]) forkAt[forkIdx] = [];
            forkAt[forkIdx].push({ branch: cb, skipCount: 0 });
        });

        return buildNodeChain(branch, nodes, startIdx, forkAt, showArrowPrefix);
    }

    // Like renderBranchSubtree but appends End node at each leaf branch.
    function renderBranchSubtreeWithEnd(branch, startIdx, showArrowPrefix) {
        var nodes = traceGraphData[branch.id] || [];
        var childBranches = branches.filter(function(b) {
            return b.parentBranchId === branch.id && b.forkNodeIdx !== -1;
        });

        var forkAt = {};
        childBranches.forEach(function(cb) {
            var forkIdx;
            if (cb.forkNodeIdx != null && cb.forkNodeIdx >= 0) {
                forkIdx = cb.forkNodeIdx;
            } else if (cb.forkNodeIdx === -1) {
                forkIdx = 0;
            } else {
                forkIdx = -1;
                if (cb.forkFrameIndex != null) {
                    for (var j = nodes.length - 1; j >= 0; j--) {
                        if (nodes[j].frameIndex <= cb.forkFrameIndex) {
                            forkIdx = j; break;
                        }
                    }
                }
                if (forkIdx === -1) forkIdx = Math.max(0, nodes.length - 1);
            }
            if (!forkAt[forkIdx]) forkAt[forkIdx] = [];
            forkAt[forkIdx].push({ branch: cb, skipCount: 0 });
        });

        return buildNodeChainWithEnd(branch, nodes, startIdx, forkAt, showArrowPrefix);
    }

    var ARROW = '<span class="tg-arrow"><svg width="28" height="14" viewBox="0 0 28 14"><path d="M2 7h20m0 0l-5-4m5 4l-5 4" fill="none" stroke="#B0B5C2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';

    function buildNodeChain(branch, nodes, idx, forkAt, showArrowPrefix) {
        if (idx >= nodes.length) {
            // No more parent nodes, but there might be child forks at this index
            var trailingForks = forkAt[idx] || [];
            if (trailingForks.length === 0) return '';
            var html = '';
            trailingForks.forEach(function(item) {
                html += renderBranchSubtree(item.branch, item.skipCount, false);
            });
            return html;
        }

        // Render a flat horizontal chain of nodes that have no forks.
        // When we hit a fork point (or the end), split into .tg-children.
        var html = '<div class="tg-branch">';
        var i = idx;
        var first = true;
        while (i < nodes.length) {
            var forksHere = forkAt[i] || [];
            // Arrow before node (between consecutive nodes, or at branch start)
            if (first && showArrowPrefix) {
                html += ARROW;
            } else if (!first) {
                html += ARROW;
            }
            first = false;
            html += renderNodeEl(nodes[i], branch);

            var hasMore = i + 1 < nodes.length;
            if (forksHere.length > 0) {
                // Fork point: CSS tree connectors handle the visual connection
                // from this node to each child branch.
                var childrenHtml = '';
                if (hasMore) {
                    childrenHtml += buildNodeChain(branch, nodes, i + 1, forkAt, false);
                }
                forksHere.forEach(function(item) {
                    childrenHtml += renderBranchSubtree(item.branch, item.skipCount, false);
                });
                if (childrenHtml) {
                    html += '<span class="tg-fork-line"></span>';
                    html += '<div class="tg-children">' + childrenHtml + '</div>';
                }
                break; // rest of chain is handled recursively inside .tg-children
            }
            if (!hasMore) break;
            // No fork here and more nodes follow: continue flat chain
            i++;
        }
        html += '</div>';
        return html;
    }

    // Like buildNodeChain but appends an End node when the chain has no children/forks.
    function buildNodeChainWithEnd(branch, nodes, idx, forkAt, showArrowPrefix) {
        if (idx >= nodes.length) {
            var trailingForks = forkAt[idx] || [];
            if (trailingForks.length === 0) {
                // Empty branch with no forks → just an End node alone
                return '<div class="tg-branch">' + (showArrowPrefix ? ARROW : '') + terminalNodeFor(branch) + '</div>';
            }
            var html = '';
            trailingForks.forEach(function(item) {
                html += renderBranchSubtreeWithEnd(item.branch, item.skipCount, false);
            });
            return html;
        }

        var html = '<div class="tg-branch">';
        var i = idx;
        var first = true;
        while (i < nodes.length) {
            var forksHere = forkAt[i] || [];
            if (first && showArrowPrefix) {
                html += ARROW;
            } else if (!first) {
                html += ARROW;
            }
            first = false;
            html += renderNodeEl(nodes[i], branch);

            var hasMore = i + 1 < nodes.length;
            if (forksHere.length > 0) {
                var childrenHtml = '';
                if (hasMore) {
                    childrenHtml += buildNodeChainWithEnd(branch, nodes, i + 1, forkAt, false);
                } else {
                    // This branch's chain ends here but it has child forks → terminate this
                    // branch's own line with an End node alongside the child branches
                    childrenHtml += '<div class="tg-branch">' + ARROW + terminalNodeFor(branch) + '</div>';
                }
                forksHere.forEach(function(item) {
                    childrenHtml += renderBranchSubtreeWithEnd(item.branch, item.skipCount, false);
                });
                if (childrenHtml) {
                    html += '<span class="tg-fork-line"></span>';
                    html += '<div class="tg-children">' + childrenHtml + '</div>';
                }
                break;
            }
            if (!hasMore) {
                // Leaf: append End node
                html += ARROW + terminalNodeFor(branch);
                break;
            }
            i++;
        }
        html += '</div>';
        return html;
    }

    function renderNodeEl(n, branch) {
        var ab = getActiveBranch();
        var isActive = ab && ab.id === branch.id;
        var isDisabled = llm_is_work && !isActive;
        var iconSrc = (n.node_type === 'llm' || n.node_type === 'model')
            ? './image/org_model.svg' : './image/org_tool.svg';
        return '<div class="tg-node' + (isActive ? ' active' : '') + (isDisabled ? ' disabled' : '') + '"'
            + ' data-trace-id="' + escapeHtml(n.trace_id) + '"'
            + ' title="' + escapeHtml(n.callee) + ' (' + escapeHtml(n.node_id) + ')">'
            + (n.caller ? '<div class="tg-node-caller">' + escapeHtml(n.caller) + '</div>' : '')
            + '<div class="tg-node-main">'
            + '<img class="tg-node-icon" src="' + iconSrc + '" alt="" />'
            + '<span class="tg-node-callee">' + escapeHtml(n.callee) + '</span>'
            + '</div></div>';
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Click a Trace Graph node → find the branch with that trace_id → switch.
    $('#tracegraph-body').on('click', '.tg-node', function () {
        var tid = $(this).attr('data-trace-id');
        if (!tid) return;
        var branch = branches.find(function(b) { return b.traceId === tid; });
        if (branch) switchBranch(branch.id);
    });

    // Set traceId on active branch and re-render the graph.
    function traceGraphSetTrace(trace_id) {
        if (!trace_id) return;
        var ab = getActiveBranch();
        if (ab) {
            var isFirst = !ab.traceId;
            ab.traceId = trace_id;
            renderTraceGraph();
            if (isFirst) {
                $('#tracegraph-section').removeClass('collapsed');
                document.body.classList.remove('tracegraph-hidden');
            }
        }
    }

    // 从中间节点重跑推理（利用 restart_node_id 后端能力）
    // Creates a new branch forking from the current branch at the current show_id.
    function restart_from_node(nodeId, editedOutput) {
        if (llm_is_work) return;

        var parentBranch = getActiveBranch();
        var forkIndex = show_id;

        // Restore chat state from the fork point
        var forkFrame = parentBranch ? parentBranch.frames[forkIndex] : null;
        if (forkFrame) {
            chats = JSON.parse(JSON.stringify(forkFrame.answer || []));
        }
        plan_dict = {};
        nodeContentMap = {};

        // Create a new branch
        var newBranch = createBranch(parentBranch ? parentBranch.id : null, forkIndex);

        // Compute fork-node index for the Trace Graph.
        //
        // We need to find which branch OWNS the node being rerun, so the
        // new branch forks from the correct level.  The nodeId from the
        // ReRun button may be a replayed/cached copy with a different ID
        // than the original.  We resolve it via nodeCopiedIdMap and also
        // match against copied_node_id fields stored in traceGraphData.
        //
        // Strategy: build the full ancestor chain from root → current
        // branch, then search top-down (root first).  Finding the match
        // in the HIGHEST ancestor ensures the fork is placed at the
        // correct level.  If the ancestor chain has no match, fall back
        // to searching ALL branches.

        // 1. Resolve nodeId via copied-id chain
        var resolvedId = nodeId;
        var _seen = {};
        while (nodeCopiedIdMap[resolvedId] && !_seen[resolvedId]) {
            _seen[resolvedId] = true;
            resolvedId = nodeCopiedIdMap[resolvedId];
        }
        var searchIds = [nodeId];
        if (resolvedId !== nodeId) searchIds.push(resolvedId);
        // Also add reverse lookups: find any traceGraphData node whose
        // copied_node_id === nodeId, and include its node_id as a search
        // candidate (handles the case where the button ID is an original
        // but the traceGraphData stores the copy, or vice versa).
        for (var _bid in traceGraphData) {
            var _arr = traceGraphData[_bid];
            for (var _j = 0; _j < _arr.length; _j++) {
                if (_arr[_j].copied_node_id) {
                    if (searchIds.indexOf(_arr[_j].node_id) === -1
                        && searchIds.indexOf(_arr[_j].copied_node_id) !== -1) {
                        searchIds.push(_arr[_j].node_id);
                    }
                    if (searchIds.indexOf(_arr[_j].copied_node_id) === -1
                        && searchIds.indexOf(_arr[_j].node_id) !== -1) {
                        searchIds.push(_arr[_j].copied_node_id);
                    }
                }
            }
        }

        // 2. Build ancestor chain from root → parentBranch
        var ancestorChain = [];
        var cur = parentBranch;
        while (cur) {
            ancestorChain.unshift(cur);  // prepend → root first
            cur = cur.parentBranchId
                ? branches.find(function(b) { return b.id === cur.parentBranchId; })
                : null;
        }

        // Helper: search a branch's nodes for any of the searchIds
        function findNodeInBranch(branch) {
            var nodes = traceGraphData[branch.id] || [];
            for (var k = 0; k < nodes.length; k++) {
                var nd = nodes[k];
                for (var s = 0; s < searchIds.length; s++) {
                    if (nd.node_id === searchIds[s] || nd.copied_node_id === searchIds[s]) {
                        return k;
                    }
                }
            }
            return -1;
        }

        // 3. Search ancestor chain top-down (root first)
        var ownerBranch = null;
        var restartIdx = -1;
        for (var _a = 0; _a < ancestorChain.length; _a++) {
            var idx = findNodeInBranch(ancestorChain[_a]);
            if (idx !== -1) {
                ownerBranch = ancestorChain[_a];
                restartIdx = idx;
                break;              // found in the highest ancestor – stop
            }
        }

        // 4. Fallback: search ALL branches (handles non-ancestor owners)
        if (restartIdx === -1) {
            for (var _b = 0; _b < branches.length; _b++) {
                var idx2 = findNodeInBranch(branches[_b]);
                if (idx2 !== -1) {
                    ownerBranch = branches[_b];
                    restartIdx = idx2;
                    break;
                }
            }
        }

        // 5. Re-parent the new branch onto the owner of the rerun node
        if (ownerBranch) {
            newBranch.parentBranchId = ownerBranch.id;
        }
        var fni;
        if (restartIdx > 0) {
            fni = restartIdx - 1;
        } else if (restartIdx === 0) {
            // Rerunning the very first node of the owner branch: fork BEFORE
            // it so the rerun branch becomes a sibling under Start.
            fni = -1;
        } else {
            // Node not found anywhere — attach at end of parent as fallback
            var fallbackNodes = parentBranch ? (traceGraphData[parentBranch.id] || []) : [];
            fni = Math.max(0, fallbackNodes.length - 1);
        }
        newBranch.forkNodeIdx = fni;
        console.log('[TraceGraph] fork:', newBranch.id,
            'parent:', newBranch.parentBranchId,
            'restartNodeId:', nodeId,
            'searchIds:', searchIds,
            'ownerBranch:', ownerBranch ? ownerBranch.id : null,
            'restartIdx:', restartIdx,
            'forkNodeIdx:', fni);

        // Re-render trace graph to show the new branch
        renderTraceGraph();

        var payload = {
            "restart_node_id": nodeId,
            "shared_data": {"extra": "extra argument"},
        };
        if (editedOutput !== undefined && editedOutput !== null) {
            payload["restart_node_output"] = editedOutput;
        }

        // 使用与 send_message 相同的 EventSource GET 模式
        eventSource = new EventSource('../sse/chat?payload=' + encodeURIComponent(JSON.stringify(payload)));
        eventSource.onmessage = (event) => {
            message_handler(event.data);
        };
        eventSource.onerror = (e) => {
            console.log('SSE restart connection error', e);
            $("#message_send").html('<img src="./image/up_arrow.svg" alt="" />');
            eventSource.close();
            llm_is_work = false;
            renderTraceGraph();
        };
        eventSource.addEventListener("close", (event) => {
            console.log("Restart complete, closing SSE:", event.data);
            $("#message_send").html('<img src="./image/up_arrow.svg" alt="" />');
            eventSource.close();
            llm_is_work = false;
            renderTraceGraph();
        });

        var hint = (editedOutput !== undefined && editedOutput !== null)
            ? "[Restart with edited output] node_id: " + nodeId
            : "[Restart from node] node_id: " + nodeId;
        chats.push({"role": "user", "content": hint});
        var frames = getActiveFrames();
        // Seed the new branch with a hint frame
        var seedFrame = forkFrame
            ? JSON.parse(JSON.stringify(forkFrame))
            : {};
        seedFrame["answer"] = JSON.parse(JSON.stringify(chats));
        frames.push(seedFrame);
        show_id = frames.length - 1;
        show_step();
        renderTimeline(); // full rebuild to show the new branch in the selector
        send_msg_to_chatbox(hint);
        llm_is_work = true;
        $("#message_send").html('<img src="./image/stop-circle.svg" alt="" />');
    }

    function focus_agent(eid) {
        var target_div = $("#" + eid);
        var window_div = $(".center-scroll");

        // 1. 计算target_div相对于window_div的坐标
        var td_offset = target_div.offset() || {};
        var wd_offset = window_div.offset() || {};

        var td = {
            x: td_offset.left - wd_offset.left + window_div.scrollLeft(),
            y: td_offset.top - wd_offset.top + window_div.scrollTop(),
            w: target_div.outerWidth(),
            h: target_div.outerHeight()
        };
        var wd = {
            l: window_div.scrollLeft(),
            t: window_div.scrollTop(),
            w: window_div.width(),
            h: window_div.height()
        };

        // 2. 判断是否在可视区域
        if (
            td.y >= wd.t &&
            td.y + td.h <= wd.t + wd.h &&
            td.x >= wd.l &&
            td.x + td.w <= wd.l + wd.w
        ) {
            return;
        }

        // 3. 计算要滚动到的中心
        var scrollTop = Math.max(0, td.y + td.h / 2 - wd.h / 2);
        var scrollLeft = Math.max(0, td.x + td.w / 2 - wd.w / 2);

        window_div.animate({scrollTop: scrollTop, scrollLeft: scrollLeft}, 200);
    }

    function extractFrameInfo(history, index) {
        var info = { index: index, actionType: '', label: '', detail: '', agentName: '' };
        var agentLog = history.agent_log || {};
        var answer = history.answer || [];
        info.agentName = agentLog.agent_name || '';

        if (index === 0) {
            info.actionType = 'init';
            info.label = 'Start';
            info.detail = 'Initial state';
        } else if (answer.length > 0 && answer[answer.length - 1].role === 'user') {
            info.actionType = 'user';
            info.label = 'User';
            var msg = answer[answer.length - 1].content || '';
            info.detail = msg.length > 30 ? msg.substring(0, 28) + '...' : msg;
        } else if (agentLog.plannings && agentLog.plannings.length > 0) {
            var last = agentLog.plannings[agentLog.plannings.length - 1];
            if (last.type === 'observation') {
                info.actionType = 'observation';
                info.label = last.callee || info.agentName || 'Tool';
            } else {
                info.actionType = 'llm';
                info.label = info.agentName || 'LLM';
            }
            info.detail = agentLog.job_desc || '';
            if (info.detail.length > 30) info.detail = info.detail.substring(0, 28) + '...';
        } else {
            info.actionType = 'agent';
            info.label = info.agentName || ('Frame ' + (index + 1));
            info.detail = agentLog.job_desc || '';

    function captureTreeThumbnail(toolCallState) {
        var wrapper = document.getElementById('org-zoom-wrapper');
        if (!wrapper) return '';
        var nodes = wrapper.querySelectorAll('.item-template');
        if (nodes.length === 0) return '';

        // Apply highlights for this frame
        nodes.forEach(function(node) {
            node.classList.remove('select', 'pre-select');
        });
        if (toolCallState && typeof toolCallState === 'object') {
            Object.entries(toolCallState).forEach(function(entry) {
                var el = document.getElementById(entry[0]);
                if (el) {
                    if (entry[1] === 'red') el.classList.add('select');
                    else if (entry[1] === 'yellow') el.classList.add('pre-select');
                }
            });
        }

        // Draw nodes on a small canvas
        var canvas = document.createElement('canvas');
        var cw = 120, ch = 80;
        canvas.width = cw;
        canvas.height = ch;
        var ctx = canvas.getContext('2d');

        var wr = wrapper.getBoundingClientRect();
        var contentW = wrapper.scrollWidth;
        var contentH = wrapper.scrollHeight;
        if (contentW === 0 || contentH === 0) return '';

        var scaleX = cw / contentW;
        var scaleY = ch / contentH;
        var scale = Math.min(scaleX, scaleY) * 0.9;
        var offX = (cw - contentW * scale) / 2;
        var offY = (ch - contentH * scale) / 2;

        nodes.forEach(function(node) {
            var r = node.getBoundingClientRect();
            var nx = (r.left - wr.left) / orgZoomLevel;
            var ny = (r.top - wr.top) / orgZoomLevel;
            var nw = r.width / orgZoomLevel;
            var nh = r.height / orgZoomLevel;

            var x = offX + nx * scale;
            var y = offY + ny * scale;
            var w = nw * scale;
            var h = nh * scale;

            if (node.classList.contains('select')) {
                ctx.fillStyle = '#155EEF';
                ctx.strokeStyle = '#0E47C0';
                ctx.lineWidth = 0.5;
                ctx.fillRect(x, y, w, h);
                ctx.strokeRect(x, y, w, h);
            } else if (node.classList.contains('pre-select')) {
                ctx.fillStyle = '#C5D3E8';
                ctx.strokeStyle = '#155EEF';
                ctx.lineWidth = 1.5;
                ctx.fillRect(x, y, w, h);
                ctx.strokeRect(x, y, w, h);
            } else {
                ctx.fillStyle = '#C5D3E8';
                ctx.strokeStyle = '#93A8C9';
                ctx.lineWidth = 0.5;
                ctx.fillRect(x, y, w, h);
                ctx.strokeRect(x, y, w, h);
            }
        });

        return canvas.toDataURL('image/png');
    }

    function createTimelineFrameEl(info, index) {
        var frame = document.createElement('div');
        frame.className = 'timeline-frame';
        frame.setAttribute('data-frame-index', index);
        if (index === show_id) frame.classList.add('active');
        else if (index < show_id) frame.classList.add('visited');

        if (info.thumbnail) {
            var thumb = document.createElement('img');
            thumb.className = 'timeline-thumb-img';
            thumb.src = info.thumbnail;
            thumb.draggable = false;
            frame.appendChild(thumb);
        }

        var badge = document.createElement('div');
        badge.className = 'timeline-thumb-badge';
        badge.textContent = '#' + (index + 1);
        frame.appendChild(badge);

        frame.addEventListener('click', function() { jumpToFrame(index); });
        return frame;
    }

    function renderTimeline() {
        var track = document.getElementById('timeline-track');
        if (!track) return;
        track.innerHTML = '';

        var wrapper = document.getElementById('org-zoom-wrapper');
        var nodes = wrapper ? wrapper.querySelectorAll('.item-template') : [];
        var canCapture = nodes.length > 0;

        if (canCapture) {
            // Save current highlight state
            var savedState = {};
            nodes.forEach(function(node) {
                if (node.id) {
                    if (node.classList.contains('select')) savedState[node.id] = 'select';
                    else if (node.classList.contains('pre-select')) savedState[node.id] = 'pre-select';
                }
            });

            var af = getActiveFrames();
            for (var i = 0; i < af.length; i++) {
                var info = extractFrameInfo(af[i], i);
                info.thumbnail = captureTreeThumbnail(af[i].tool_call);
                track.appendChild(createTimelineFrameEl(info, i));
            }

            // Restore original highlight state
            nodes.forEach(function(node) {
                node.classList.remove('select', 'pre-select');
                if (node.id && savedState[node.id]) {
                    node.classList.add(savedState[node.id]);
                }
            });
            if (typeof updateMinimap === 'function') updateMinimap();
        } else {
            var af = getActiveFrames();
            for (var i = 0; i < af.length; i++) {
                var info = extractFrameInfo(af[i], i);
                track.appendChild(createTimelineFrameEl(info, i));
            }
        }

        renderBranchSelector();
        scrollTimelineToActive();
    }

    function updateTimelineActive() {
        var track = document.getElementById('timeline-track');
        if (!track) return;
        var frames = track.querySelectorAll('.timeline-frame');
        for (var i = 0; i < frames.length; i++) {
            frames[i].classList.remove('active', 'visited');
            if (i === show_id) frames[i].classList.add('active');
            else if (i < show_id) frames[i].classList.add('visited');
        }
        scrollTimelineToActive();
    }

            document.body.classList.remove('timeline-hidden');
        }
        var track = document.getElementById('timeline-track');
        if (!track) return;
        var info = extractFrameInfo(history, index);

        // Capture current minimap canvas as thumbnail (tree is already in correct state)
        if (typeof updateMinimap === 'function') updateMinimap();
        var srcCanvas = document.getElementById('org-minimap-canvas');
        if (srcCanvas && srcCanvas.width > 0) {
            try { info.thumbnail = srcCanvas.toDataURL('image/png'); } catch(e) {}
        }

        track.appendChild(createTimelineFrameEl(info, index));
        updateTimelineActive();
    }

    function scrollTimelineToActive() {
        var wrapper = document.getElementById('timeline-track-wrapper');
        if (!wrapper) return;
        var active = wrapper.querySelector('.timeline-frame.active');
        if (!active) return;
        var fl = active.offsetLeft;
        var fw = active.offsetWidth;
        var ww = wrapper.clientWidth;
        var sl = wrapper.scrollLeft;
        if (fl < sl || fl + fw > sl + ww) {
            wrapper.scrollLeft = fl - (ww / 2) + (fw / 2);
        }
    }

    // ── Right panel resize handle ──
    (function () {
        var handle = document.getElementById('rightResizeHandle');
        var rightPanel = document.getElementById('rightId');
        var dragging = false;
        var startX, startWidth;

        handle.addEventListener('mousedown', function (e) {
            e.preventDefault();
            dragging = true;
            startX = e.clientX;
            startWidth = rightPanel.offsetWidth;
            handle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', function (e) {
            if (!dragging) return;
            // Use mouse position relative to container's right edge to compute max width.
            // This guarantees the right panel can never extend past the viewport.
            var containerRect = rightPanel.parentElement.getBoundingClientRect();
            var rightMargin = 20;
            var maxFromEdge = containerRect.right - e.clientX - handle.offsetWidth - rightMargin;
            var newWidth = startWidth - (e.clientX - startX);
            newWidth = Math.max(200, Math.min(newWidth, maxFromEdge));
            rightPanel.style.flex = '0 0 ' + newWidth + 'px';
        });

        document.addEventListener('mouseup', function () {
            if (!dragging) return;
            dragging = false;
            handle.classList.remove('active');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });
    })();

    // 处理选择的文件
    function handleFiles(files) {

            // 检查文件类型

            if (!fileType) {

                // 添加到上传列表
                filesToUpload.push({

                    name: file.name,
                    size: formatFileSize(file.size),
                    type: fileType,
                    progress: 0,
                    status: 'pending' // pending, uploading, success, error
                });
                renderFileList();
            })
        }

    // 获取文件类型
    // 获取文件类型（决定是否允许以及后续展示用）
    function getFileType(filename) {
        var ext = filename.split('.').pop().toLowerCase();
        switch (ext) {
            case 'txt':     return 'text';
            case 'jpg':
            case 'jpeg':    return 'jpg';
            case 'png':     return 'png';
            case 'mp4':     return 'mp4';
            case 'xlsx':
            case 'xls':     return 'excel';
            case 'doc':
            case 'docx':    return 'word';
            case 'pdf':     return 'pdf';
            case 'csv':     return 'csv';
            case 'tsv':     return 'tsv';
            case 'ods':     return 'ods';
            case 'py':      return 'python';
            case 'md':      return 'markdown';
            case 'json':    return 'json';
            default:        return 'file';   // 其它未知格式统一按通用文件处理
        }
    }


    // 格式化文件大小
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        var k = 1024;
        var sizes = ['Bytes', 'KB', 'MB', 'GB'];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
